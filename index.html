<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>成年礼</title>
    <!-- 引入 Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&family=Noto+Serif+SC:wght@400;700&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>

<body>
    <div class="background-animation"></div>

    <div class="container" id="main-container">
        <header>
            <h1 class="title">2026届高三12班成年礼相册</h1>
            <p class="subtitle">珍藏那一刻的青春与美好</p>
        </header>

        <main>
            <!-- 相册网格视图 -->
            <div class="album-grid" id="album-grid">
                <!-- 相册卡片将通过 JS 动态生成 -->
            </div>
        </main>
    </div>

    <!-- 密码输入模态框 -->
    <div class="modal-overlay" id="password-modal">
        <div class="modal-content glass-effect">
            <button class="close-btn" id="close-modal-btn">&times;</button>
            <h2 id="modal-album-name">输入密码</h2>
            <p class="modal-desc">此相册受保护，只有提供正确的密码才能查看照片。</p>
            <div class="input-group">
                <input type="password" id="album-password" placeholder="请输入密码..." autofocus>
                <button id="submit-password">解锁相册</button>
            </div>
            <p id="password-error" class="error-msg">密码错误，请重试</p>
        </div>
    </div>

    <!-- 画廊视图：展示照片 -->
    <div class="gallery-overlay glass-effect" id="gallery-view">
        <header class="gallery-header">
            <h2 class="gallery-title" id="gallery-title">相册</h2>
            <button class="back-btn" id="back-to-albums">返回相册列表</button>
        </header>
        <div class="gallery-grid" id="gallery-images">
            <!-- 照片将通过 JS 动态生成 -->
        </div>

        <!-- 全屏图片查看器 -->
        <div class="lightbox" id="lightbox">
            <button class="close-lightbox" id="close-lightbox">&times;</button>
            <img class="lightbox-img" id="lightbox-img" src="" alt="查看大图">
        </div>
    </div>

    <script src="data.js"></script>
    <script src="script.js"></script>
</body>

</html>
